# ═════════════════════════════════════════════════════════════════════════════
# LM Studio TUI Configuration
# Location: ~/.config/lmstudio-tui/config.toml
# ═════════════════════════════════════════════════════════════════════════════
#
# Only the sections below are parsed by the application.
# Copy this file to ~/.config/lmstudio-tui/config.toml and edit as needed.

# ─────────────────────────────────────────────────────────────────────────────
# Server Connection
# ─────────────────────────────────────────────────────────────────────────────
[server]
# Hostname or IP address of the LM Studio server
host = "localhost"

# API port for LM Studio server (LM Studio default: 1234)
port = 1234

# Connection timeout in seconds
timeout = 10.0

# Retry failed connections
retry = true

# Path to API token file. The file should contain the bare token string.
# Set to null (or omit) to connect without authentication.
# api_token_path = "~/.lmstudio/token"

# Verify SSL certificates (set to false for self-signed certs)
verify_ssl = true

# ─────────────────────────────────────────────────────────────────────────────
# GPU Monitoring
# ─────────────────────────────────────────────────────────────────────────────
[gpu]
# Enable GPU monitoring (requires NVIDIA GPU and pynvml)
monitoring_enabled = true

# How often to poll GPU metrics (seconds)
update_frequency = 1.0

# ─────────────────────────────────────────────────────────────────────────────
# Alert Thresholds
# ─────────────────────────────────────────────────────────────────────────────
[alerts.temperature]
# Warning threshold (°C) — panel row turns yellow
warning = 80

# Critical threshold (°C) — panel row turns red
critical = 90

[alerts.vram]
# Warning threshold (% of total VRAM) — panel row turns yellow
warning = 95

# Critical threshold (% of total VRAM) — panel row turns red
critical = 98

# ─────────────────────────────────────────────────────────────────────────────
# Chat
# ─────────────────────────────────────────────────────────────────────────────
[chat]
# System prompt prepended to every chat conversation.
system_prompt = "You are a helpful assistant."
